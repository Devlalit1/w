version: '3.8'

services:
  postgres:
    image: postgres:15-alpine
    container_name: devverse-postgres
    environment:
      POSTGRES_USER: devverse
      POSTGRES_PASSWORD: password
      POSTGRES_DB: devverse_ai
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U devverse"]
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    container_name: devverse-redis
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  backend:
    build:
      context: .
      dockerfile: apps/backend/Dockerfile
    container_name: devverse-backend
    ports:
      - "3001:3001"
    environment:
      NODE_ENV: development
      DATABASE_URL: postgresql://devverse:password@postgres:5432/devverse_ai
      REDIS_URL: redis://redis:6379
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    volumes:
      - ./apps/backend/src:/app/src
    command: npm run dev

  ai-service:
    build:
      context: ./apps/ai-service
      dockerfile: Dockerfile
    container_name: devverse-ai-service
    ports:
      - "8000:8000"
    environment:
      OPENAI_API_KEY: ${OPENAI_API_KEY}
      BACKEND_URL: http://backend:3001
    depends_on:
      - backend
    volumes:
      - ./apps/ai-service:/app

  frontend:
    build:
      context: .
      dockerfile: apps/web/Dockerfile.dev
    container_name: devverse-frontend
    ports:
      - "3000:3000"
    environment:
      NEXT_PUBLIC_API_URL: http://backend:3001
      NEXT_PUBLIC_WS_URL: ws://localhost:3001
    depends_on:
      - backend
    volumes:
      - ./apps/web/src:/app/src
    command: npm run dev

volumes:
  postgres_data:
  redis_data:
